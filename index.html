<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ametist — Нейросеть для презентаций</title>
    <!-- Шрифты и иконки -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f5f0ff;
            min-height: 100vh;
            color: #1e1b2b;
        }
        /* Стартовый экран */
        .landing {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            transition: opacity 0.3s;
        }
        .landing.hidden { display: none; }
        .logo-large {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
        }
        .logo-icon-large {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 40px;
            box-shadow: 0 20px 40px rgba(124, 58, 237, 0.3);
        }
        .logo-large h1 {
            font-weight: 700; font-size: 56px;
            background: linear-gradient(135deg, #6d28d9, #8b5cf6);
            -webkit-background-clip: text; background-clip: text;
            color: transparent;
        }
        .search-container {
            width: 100%; max-width: 600px; margin-bottom: 40px;
        }
        .search-box-landing {
            display: flex; background: white; border-radius: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(124, 58, 237, 0.2);
        }
        .search-box-landing input {
            flex: 1; padding: 20px 28px; border: none;
            border-radius: 60px 0 0 60px; font-size: 18px; outline: none;
        }
        .search-box-landing button {
            padding: 20px 36px; background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none; border-radius: 60px; color: white; font-weight: 600;
            font-size: 18px; cursor: pointer; display: flex; align-items: center;
            gap: 10px; transition: all 0.3s;
        }
        .design-gallery { width: 100%; max-width: 900px; }
        .design-gallery h3 { text-align: center; margin-bottom: 24px; color: #2e1065; }
        .design-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }
        .design-card {
            background: white; border-radius: 24px; padding: 20px; cursor: pointer;
            border: 2px solid transparent; transition: all 0.3s; text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .design-card.active { border-color: #7c3aed; }
        .design-preview {
            width: 100%; height: 120px; border-radius: 16px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: white;
        }
        /* Редактор */
        .app { display: none; flex-direction: column; height: 100vh; }
        .app.visible { display: flex; }
        .app-header {
            background: white; padding: 8px 24px; display: flex;
            align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(124, 58, 237, 0.1);
        }
        .app-logo { display: flex; align-items: center; gap: 12px; }
        .app-logo-icon {
            width: 36px; height: 36px; background: linear-gradient(135deg, #7c3aed, #a855f7);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 18px;
        }
        .app-btn {
            padding: 8px 16px; border-radius: 40px; font-weight: 600; font-size: 14px;
            cursor: pointer; border: none; background: white;
            border: 1px solid rgba(124, 58, 237, 0.2); color: #4c1d95;
            display: flex; align-items: center; gap: 8px;
        }
        .app-btn.primary { background: #7c3aed; color: white; border: none; }
        .ribbon {
            background: white; border-bottom: 1px solid rgba(124, 58, 237, 0.1);
            padding: 4px 16px;
        }
        .ribbon-tabs { display: flex; gap: 4px; }
        .ribbon-tab {
            padding: 8px 16px; font-weight: 600; font-size: 14px;
            color: #4b5563; cursor: pointer; border-bottom: 2px solid transparent;
        }
        .ribbon-tab.active { color: #7c3aed; border-bottom-color: #7c3aed; }
        .editor-container { display: flex; flex: 1; overflow: hidden; }
        .slide-sider {
            width: 260px; background: white; border-right: 1px solid rgba(124, 58, 237, 0.1);
            display: flex; flex-direction: column; padding: 16px 0;
        }
        .slides-list { flex: 1; overflow-y: auto; padding: 0 12px; }
        .slide-thumb {
            margin-bottom: 12px; border-radius: 8px; border: 2px solid transparent;
            cursor: pointer; background: #faf8ff; padding: 10px;
        }
        .slide-thumb.active { border-color: #7c3aed; }
        .workspace {
            flex: 1; display: flex; flex-direction: column; background: #e9e1f9;
            padding: 24px; overflow-y: auto;
        }
        .slide-canvas {
            background: white; width: 100%; max-width: 960px; margin: 0 auto;
            aspect-ratio: 16/9; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 40px; display: flex; flex-direction: column; overflow-y: auto;
            transition: background 0.3s;
        }
        .slide-title-editable {
            font-size: 32px; font-weight: 700; color: #2e1065; margin-bottom: 24px;
            border: none; outline: none;
        }
        .slide-content-editable { display: flex; gap: 32px; flex: 1; }
        .slide-text-editable {
            flex: 1; font-size: 18px; line-height: 1.6; color: #4b5563;
            border: none; outline: none;
        }
        .slide-visual {
            width: 200px; height: 200px; background: linear-gradient(135deg, #f3e8ff, #e9d5ff);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            color: #a855f7; font-size: 64px; flex-shrink: 0;
        }
        .properties-panel {
            width: 300px; background: white; border-left: 1px solid rgba(124, 58, 237, 0.1);
            padding: 16px; overflow-y: auto;
        }
        .panel-section { margin-bottom: 24px; }
        .panel-title { font-weight: 600; margin-bottom: 12px; color: #2e1065; }
        select, input { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; }
        /* Слайд-шоу */
        .slideshow-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #1e1b2b; z-index: 2000; display: none;
            align-items: center; justify-content: center;
        }
        .slideshow-container {
            width: 90%; max-width: 1200px; aspect-ratio: 16/9;
            background: white; border-radius: 16px; padding: 60px;
            display: flex; flex-direction: column; position: relative;
            transition: opacity 0.5s, transform 0.5s;
        }
        .slideshow-controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px;
        }
        .slideshow-btn {
            background: rgba(255,255,255,0.2); border: none; color: white;
            width: 50px; height: 50px; border-radius: 50%; font-size: 24px; cursor: pointer;
        }
        /* Анимации объектов */
        .animated { animation-duration: 0.5s; animation-fill-mode: both; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-50px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        /* Тосты */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1e1b2b; color: white; padding: 16px 28px; border-radius: 60px;
            z-index: 3000; opacity: 0; transition: 0.3s;
        }
        .toast.show { opacity: 1; }
        .loading-spinner {
            width: 40px; height: 40px; border: 4px solid #e9d5ff;
            border-top-color: #7c3aed; border-radius: 50%; animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- Стартовый экран -->
<div class="landing" id="landing">
    <div class="logo-large">
        <div class="logo-icon-large"><i class="fas fa-gem"></i></div>
        <h1>Ametist</h1>
    </div>
    <div class="search-container">
        <div class="search-box-landing">
            <input type="text" id="landingTopicInput" placeholder="Введите тему презентации...">
            <button id="landingGenerateBtn"><i class="fas fa-magic"></i> Создать</button>
        </div>
    </div>
    <div class="design-gallery">
        <h3>Выберите стиль презентации</h3>
        <div class="design-grid" id="designGrid"></div>
    </div>
</div>

<!-- Редактор -->
<div class="app" id="app">
    <div class="app-header">
        <div class="app-logo"><div class="app-logo-icon"><i class="fas fa-gem"></i></div><h1>Ametist</h1></div>
        <div class="app-actions">
            <button class="app-btn" id="slideshowBtn"><i class="fas fa-play"></i> Слайд-шоу</button>
            <button class="app-btn" id="backToLandingBtn"><i class="fas fa-home"></i> На главную</button>
        </div>
    </div>
    <div class="ribbon">
        <div class="ribbon-tabs">
            <div class="ribbon-tab active" data-tab="home">Главная</div>
            <div class="ribbon-tab" data-tab="transitions">Переходы</div>
            <div class="ribbon-tab" data-tab="animations">Анимации</div>
        </div>
    </div>
    <div class="editor-container">
        <div class="slide-sider">
            <div style="padding:0 12px 16px;">
                <button class="app-btn primary" id="addSlideBtn" style="width:100%; justify-content:center;"><i class="fas fa-plus"></i> Новый слайд</button>
            </div>
            <div class="slides-list" id="slidesList"></div>
        </div>
        <div class="workspace">
            <div class="slide-canvas" id="slideCanvas">
                <div class="slide-title-editable" id="slideTitle" contenteditable="true">Заголовок</div>
                <div class="slide-content-editable" id="slideContentArea">
                    <div class="slide-text-editable" id="slideText" contenteditable="true">Текст слайда...</div>
                    <div class="slide-visual" id="slideVisual"><i class="fas fa-image"></i></div>
                </div>
            </div>
        </div>
        <div class="properties-panel" id="propertiesPanel">
            <!-- Содержимое будет динамически меняться в зависимости от вкладки -->
        </div>
    </div>
</div>

<!-- Слайд-шоу -->
<div class="slideshow-overlay" id="slideshowOverlay">
    <div class="slideshow-container" id="slideshowContainer">
        <div class="slide-title-editable" id="slideshowTitle">Заголовок</div>
        <div class="slide-content-editable" id="slideshowContent">
            <div class="slide-text-editable" id="slideshowText">Текст</div>
            <div class="slide-visual" id="slideshowVisual"><i class="fas fa-image"></i></div>
        </div>
        <div class="slideshow-controls">
            <button class="slideshow-btn" id="prevSlideShowBtn"><i class="fas fa-chevron-left"></i></button>
            <button class="slideshow-btn" id="nextSlideShowBtn"><i class="fas fa-chevron-right"></i></button>
            <button class="slideshow-btn" id="closeSlideshowBtn"><i class="fas fa-times"></i></button>
        </div>
    </div>
</div>

<!-- Модалка генерации -->
<div class="modal-overlay" id="generatingModal" style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:1000;">
    <div style="background:white; border-radius:24px; padding:32px; max-width:500px;">
        <h3>Генерация презентации</h3>
        <div class="loading-spinner"></div>
        <p id="generatingStatus">Поиск информации в Википедии...</p>
    </div>
</div>

<!-- Тосты -->
<div class="toast" id="toast"><span id="toastMessage"></span></div>

<script>
(function(){
    "use strict";

    // Состояние
    let presentationData = { title: '', slides: [] };
    let currentSlideIndex = -1;
    let selectedDesign = { name: 'Аметист', gradient: 'linear-gradient(135deg, #7c3aed, #a855f7)', icon: 'fa-gem' };
    let slideshowIndex = 0;
    let activeTab = 'home';

    // Данные о переходах и анимациях для каждого слайда
    // transition: { type: 'none', duration: 0.5 }
    // animations: { title: 'none', text: 'none', visual: 'none' }

    // DOM
    const landing = document.getElementById('landing');
    const app = document.getElementById('app');
    const landingTopic = document.getElementById('landingTopicInput');
    const landingGenerate = document.getElementById('landingGenerateBtn');
    const designGrid = document.getElementById('designGrid');
    const slidesList = document.getElementById('slidesList');
    const slideTitle = document.getElementById('slideTitle');
    const slideText = document.getElementById('slideText');
    const slideVisual = document.getElementById('slideVisual');
    const slideCanvas = document.getElementById('slideCanvas');
    const propertiesPanel = document.getElementById('propertiesPanel');
    const slideshowBtn = document.getElementById('slideshowBtn');
    const slideshowOverlay = document.getElementById('slideshowOverlay');
    const slideshowContainer = document.getElementById('slideshowContainer');
    const slideshowTitle = document.getElementById('slideshowTitle');
    const slideshowText = document.getElementById('slideshowText');
    const slideshowVisual = document.getElementById('slideshowVisual');
    const prevSlideShowBtn = document.getElementById('prevSlideShowBtn');
    const nextSlideShowBtn = document.getElementById('nextSlideShowBtn');
    const closeSlideshowBtn = document.getElementById('closeSlideshowBtn');
    const generatingModal = document.getElementById('generatingModal');
    const generatingStatus = document.getElementById('generatingStatus');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');
    const backToLandingBtn = document.getElementById('backToLandingBtn');
    const addSlideBtn = document.getElementById('addSlideBtn');

    // Дизайны
    const designs = [
        { name: 'Аметист', gradient: 'linear-gradient(135deg, #7c3aed, #a855f7)', icon: 'fa-gem' },
        { name: 'Океан', gradient: 'linear-gradient(135deg, #06b6d4, #3b82f6)', icon: 'fa-water' },
        { name: 'Закат', gradient: 'linear-gradient(135deg, #f59e0b, #ef4444)', icon: 'fa-sun' },
        { name: 'Лес', gradient: 'linear-gradient(135deg, #10b981, #34d399)', icon: 'fa-leaf' },
        { name: 'Космос', gradient: 'linear-gradient(135deg, #1e1b4b, #312e81)', icon: 'fa-rocket' },
        { name: 'Неон', gradient: 'linear-gradient(135deg, #ec4899, #f43f5e)', icon: 'fa-bolt' }
    ];

    function renderDesigns() {
        designGrid.innerHTML = designs.map((d,i) => `
            <div class="design-card ${i===0?'active':''}" data-index="${i}">
                <div class="design-preview" style="background: ${d.gradient};">
                    <i class="fas ${d.icon}"></i>
                </div>
                <div class="design-name">${d.name}</div>
            </div>
        `).join('');
        document.querySelectorAll('.design-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.design-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selectedDesign = designs[card.dataset.index];
            });
        });
    }
    renderDesigns();

    // Утилиты
    function showToast(msg) {
        toastMessage.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function initSlideData(slide) {
        if (!slide.transition) slide.transition = { type: 'none', duration: 0.5 };
        if (!slide.animations) slide.animations = { title: 'none', text: 'none', visual: 'none' };
        return slide;
    }

    function renderSlidesList() {
        if (!presentationData.slides.length) {
            slidesList.innerHTML = '<p style="padding:20px;text-align:center;">Нет слайдов</p>';
            return;
        }
        slidesList.innerHTML = presentationData.slides.map((s,i) => `
            <div class="slide-thumb ${i===currentSlideIndex?'active':''}" data-index="${i}">
                <div class="slide-thumb-title">${s.title || 'Без названия'}</div>
                <div class="slide-thumb-content">${(s.content||'').substring(0,40)}...</div>
            </div>
        `).join('');
        document.querySelectorAll('.slide-thumb').forEach(el => {
            el.addEventListener('click', () => {
                currentSlideIndex = parseInt(el.dataset.index);
                renderSlideToCanvas();
                renderSlidesList();
                updatePropertiesPanel();
            });
        });
    }

    function renderSlideToCanvas() {
        if (currentSlideIndex < 0) return;
        const slide = presentationData.slides[currentSlideIndex];
        slideTitle.textContent = slide.title || 'Заголовок';
        slideText.textContent = slide.content || 'Текст';
        slideVisual.innerHTML = `<i class="fas ${slide.visualIcon || selectedDesign.icon}"></i>`;
        if (selectedDesign.gradient) slideCanvas.style.background = selectedDesign.gradient;
        // layout уже хранится в slide.layout, но мы не используем сложную логику макетов для простоты
        // применяем анимации объектов (для предпросмотра в редакторе они не проигрываются)
    }

    function updatePropertiesPanel() {
        const slide = presentationData.slides[currentSlideIndex];
        if (!slide) return;
        if (activeTab === 'home') {
            propertiesPanel.innerHTML = `
                <div class="panel-section">
                    <div class="panel-title">Макет слайда</div>
                    <select id="layoutSelect">
                        <option value="title-content" ${slide.layout==='title-content'?'selected':''}>Заголовок и текст</option>
                        <option value="title-visual" ${slide.layout==='title-visual'?'selected':''}>Заголовок и объект</option>
                        <option value="title-only" ${slide.layout==='title-only'?'selected':''}>Только заголовок</option>
                    </select>
                </div>
                <div class="panel-section">
                    <div class="panel-title">Фон</div>
                    <input type="color" id="bgColorInput" value="#ffffff">
                    <button class="app-btn" id="applyDesignBtn" style="margin-top:8px;">Применить дизайн</button>
                </div>
            `;
            document.getElementById('layoutSelect').addEventListener('change', e => {
                slide.layout = e.target.value;
                // упрощённо: скрываем/показываем блок с текстом/визуалом
                const contentArea = document.getElementById('slideContentArea');
                if (slide.layout === 'title-only') contentArea.style.display = 'none';
                else contentArea.style.display = 'flex';
            });
            document.getElementById('bgColorInput').addEventListener('input', e => slideCanvas.style.background = e.target.value);
            document.getElementById('applyDesignBtn').addEventListener('click', () => {
                slideCanvas.style.background = selectedDesign.gradient;
                slide.visualIcon = selectedDesign.icon;
                slideVisual.innerHTML = `<i class="fas ${selectedDesign.icon}"></i>`;
            });
        } else if (activeTab === 'transitions') {
            propertiesPanel.innerHTML = `
                <div class="panel-section">
                    <div class="panel-title">Переход к этому слайду</div>
                    <select id="transitionType">
                        <option value="none" ${slide.transition?.type==='none'?'selected':''}>Без перехода</option>
                        <option value="fade" ${slide.transition?.type==='fade'?'selected':''}>Плавное появление</option>
                        <option value="slide" ${slide.transition?.type==='slide'?'selected':''}>Сдвиг</option>
                        <option value="zoom" ${slide.transition?.type==='zoom'?'selected':''}>Увеличение</option>
                    </select>
                    <label>Длительность (сек):</label>
                    <input type="number" id="transitionDuration" min="0.1" max="2" step="0.1" value="${slide.transition?.duration||0.5}">
                </div>
            `;
            document.getElementById('transitionType').addEventListener('change', e => slide.transition.type = e.target.value);
            document.getElementById('transitionDuration').addEventListener('input', e => slide.transition.duration = parseFloat(e.target.value));
        } else if (activeTab === 'animations') {
            propertiesPanel.innerHTML = `
                <div class="panel-section">
                    <div class="panel-title">Анимация заголовка</div>
                    <select id="animTitle">
                        <option value="none" ${slide.animations?.title==='none'?'selected':''}>Нет</option>
                        <option value="fadeIn" ${slide.animations?.title==='fadeIn'?'selected':''}>Появление</option>
                        <option value="slideInLeft" ${slide.animations?.title==='slideInLeft'?'selected':''}>Слева</option>
                        <option value="zoomIn" ${slide.animations?.title==='zoomIn'?'selected':''}>Увеличение</option>
                    </select>
                </div>
                <div class="panel-section">
                    <div class="panel-title">Анимация текста</div>
                    <select id="animText">
                        <option value="none" ${slide.animations?.text==='none'?'selected':''}>Нет</option>
                        <option value="fadeIn" ${slide.animations?.text==='fadeIn'?'selected':''}>Появление</option>
                        <option value="slideInLeft" ${slide.animations?.text==='slideInLeft'?'selected':''}>Слева</option>
                        <option value="zoomIn" ${slide.animations?.text==='zoomIn'?'selected':''}>Увеличение</option>
                    </select>
                </div>
                <div class="panel-section">
                    <div class="panel-title">Анимация объекта</div>
                    <select id="animVisual">
                        <option value="none" ${slide.animations?.visual==='none'?'selected':''}>Нет</option>
                        <option value="fadeIn" ${slide.animations?.visual==='fadeIn'?'selected':''}>Появление</option>
                        <option value="slideInLeft" ${slide.animations?.visual==='slideInLeft'?'selected':''}>Слева</option>
                        <option value="zoomIn" ${slide.animations?.visual==='zoomIn'?'selected':''}>Увеличение</option>
                    </select>
                </div>
            `;
            document.getElementById('animTitle').addEventListener('change', e => slide.animations.title = e.target.value);
            document.getElementById('animText').addEventListener('change', e => slide.animations.text = e.target.value);
            document.getElementById('animVisual').addEventListener('change', e => slide.animations.visual = e.target.value);
        }
    }

    // Вкладки ленты
    document.querySelectorAll('.ribbon-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.ribbon-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            activeTab = tab.dataset.tab;
            updatePropertiesPanel();
        });
    });

    // Слайд-шоу с переходами и анимациями
    function applyTransition(container, transition) {
        return new Promise(resolve => {
            if (!transition || transition.type === 'none') { resolve(); return; }
            container.style.transition = `all ${transition.duration}s ease`;
            if (transition.type === 'fade') {
                container.style.opacity = '0';
                setTimeout(() => { container.style.opacity = '1'; resolve(); }, 50);
            } else if (transition.type === 'slide') {
                container.style.transform = 'translateX(100%)';
                setTimeout(() => { container.style.transform = 'translateX(0)'; resolve(); }, 50);
            } else if (transition.type === 'zoom') {
                container.style.transform = 'scale(0.5)';
                setTimeout(() => { container.style.transform = 'scale(1)'; resolve(); }, 50);
            } else resolve();
            setTimeout(resolve, transition.duration*1000);
        });
    }

    function applyAnimations(container, animations) {
        const titleEl = container.querySelector('#slideshowTitle');
        const textEl = container.querySelector('#slideshowText');
        const visualEl = container.querySelector('#slideshowVisual');
        [titleEl, textEl, visualEl].forEach(el => el.style.animation = 'none');
        el.offsetHeight; // reflow
        if (animations.title !== 'none') titleEl.style.animation = `${animations.title} 0.5s`;
        if (animations.text !== 'none') textEl.style.animation = `${animations.text} 0.5s`;
        if (animations.visual !== 'none') visualEl.style.animation = `${animations.visual} 0.5s`;
    }

    async function updateSlideshowSlide() {
        const slide = presentationData.slides[slideshowIndex];
        slideshowTitle.textContent = slide.title;
        slideshowText.textContent = slide.content;
        slideshowVisual.innerHTML = `<i class="fas ${slide.visualIcon || selectedDesign.icon}"></i>`;
        slideshowContainer.style.background = selectedDesign.gradient || '#fff';
        // Применяем переход (если не первый запуск)
        if (slideshowOverlay.style.display === 'flex') {
            await applyTransition(slideshowContainer, slide.transition);
        }
        applyAnimations(slideshowContainer, slide.animations);
    }

    function openSlideshow() {
        slideshowIndex = currentSlideIndex;
        slideshowOverlay.style.display = 'flex';
        updateSlideshowSlide();
    }

    slideshowBtn.addEventListener('click', openSlideshow);
    closeSlideshowBtn.addEventListener('click', () => slideshowOverlay.style.display = 'none');
    prevSlideShowBtn.addEventListener('click', async () => {
        if (slideshowIndex > 0) {
            slideshowIndex--;
            await updateSlideshowSlide();
        }
    });
    nextSlideShowBtn.addEventListener('click', async () => {
        if (slideshowIndex < presentationData.slides.length - 1) {
            slideshowIndex++;
            await updateSlideshowSlide();
        }
    });
    document.addEventListener('keydown', async (e) => {
        if (slideshowOverlay.style.display === 'flex') {
            if (e.key === 'ArrowLeft' && slideshowIndex > 0) {
                slideshowIndex--;
                await updateSlideshowSlide();
                e.preventDefault();
            } else if (e.key === 'ArrowRight' && slideshowIndex < presentationData.slides.length - 1) {
                slideshowIndex++;
                await updateSlideshowSlide();
                e.preventDefault();
            } else if (e.key === 'Escape') slideshowOverlay.style.display = 'none';
        }
    });

    // Генерация презентации (как раньше)
    async function generatePresentation(topic) {
        generatingModal.style.display = 'flex';
        generatingStatus.textContent = 'Поиск в русской Википедии...';
        try {
            // Используем русскую Википедию
            const searchUrl = `https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(topic)}&format=json&origin=*`;
            const resp = await fetch(searchUrl);
            const data = await resp.json();
            if (!data.query.search.length) throw new Error('Ничего не найдено');
            const pageId = data.query.search[0].pageid;
            generatingStatus.textContent = `Загрузка статьи...`;
            const contentUrl = `https://ru.wikipedia.org/w/api.php?action=query&prop=extracts&exintro=1&explaintext=1&pageids=${pageId}&format=json&origin=*`;
            const contentResp = await fetch(contentUrl);
            const contentData = await contentResp.json();
            const extract = contentData.query.pages[pageId].extract;
            const slides = [];
            // Введение
            slides.push(initSlideData({ title: 'Введение', content: `${topic} — ${extract.split('.')[0]}.`, visualIcon: 'fa-flag', layout: 'title-content' }));
            // Основные
            const sentences = extract.split('. ').filter(s => s.length > 30);
            const count = Math.min(5, Math.max(2, Math.floor(sentences.length/2)));
            for (let i=0; i<count; i++) {
                const start = Math.floor(i * sentences.length/count);
                const end = Math.floor((i+1)*sentences.length/count);
                const content = sentences.slice(start, end).join('. ') + '.';
                slides.push(initSlideData({ title: ['Ключевые факты','История','Достижения','Влияние','Интересные данные'][i%5], content, visualIcon: ['fa-star','fa-landmark','fa-trophy','fa-globe','fa-lightbulb'][i%5], layout: 'title-content' }));
            }
            // Заключение
            slides.push(initSlideData({ title: 'Заключение', content: `Таким образом, ${topic} остаётся значимой темой.`, visualIcon: 'fa-check-circle', layout: 'title-content' }));
            presentationData = { title: topic, slides };
            currentSlideIndex = 0;
            renderSlidesList();
            renderSlideToCanvas();
            updatePropertiesPanel();
            generatingModal.style.display = 'none';
            showToast(`Презентация "${topic}" создана!`);
        } catch(e) {
            generatingModal.style.display = 'none';
            showToast('Ошибка: ' + e.message);
        }
    }

    landingGenerate.addEventListener('click', () => {
        const topic = landingTopic.value.trim();
        if (!topic) { showToast('Введите тему'); return; }
        landing.classList.add('hidden');
        app.classList.add('visible');
        generatePresentation(topic);
    });

    backToLandingBtn.addEventListener('click', () => {
        app.classList.remove('visible');
        landing.classList.remove('hidden');
    });

    addSlideBtn.addEventListener('click', () => {
        const newSlide = initSlideData({ title: 'Новый слайд', content: 'Текст...', visualIcon: 'fa-file', layout: 'title-content' });
        presentationData.slides.push(newSlide);
        currentSlideIndex = presentationData.slides.length - 1;
        renderSlidesList();
        renderSlideToCanvas();
        updatePropertiesPanel();
    });

    // Инициализация
    presentationData = { title: 'Новая презентация', slides: [initSlideData({ title:'Заголовок', content:'Текст', visualIcon:'fa-image', layout:'title-content' })] };
    currentSlideIndex = 0;
    renderSlidesList();
    renderSlideToCanvas();
    updatePropertiesPanel();

})();
</script>
</body>
</html>
